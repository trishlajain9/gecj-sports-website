
<section class="featured-sports-section">
	<h2 class="section-title">Featured Sports</h2>
	<p class="section-desc">Discover a wide range of sports activities and join the GECJ sports community.</p>
	<div class="sports-grid">
		<div class="sport-card" *ngFor="let sport of sports">
			<img [src]="sport.img" [alt]="'Image of ' + sport.name" class="sport-img" />
			<div class="sport-info">
				<h3>{{ sport.name }}</h3>
				<p>{{ sport.desc }}</p>
				<a [routerLink]="['/sports', sport.name.toLowerCase()]" class="sport-btn">View Details</a>
			</div>
		</div>
	</div>
</section>
