
<div class="admin-login-bg">
	<div class="admin-login-card">
		<ng-container *ngIf="!isLoggedIn; else dashboard">
			<h1 class="admin-login-title">Admin Court<br />Management</h1>
			<p class="admin-login-subtitle">Please login to access the admin panel</p>
			<form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
				<label class="admin-login-label" for="username">Username</label>
				<input class="admin-login-input" id="username" type="text" formControlName="username" placeholder="Enter your admin username" [disabled]="isSubmitting" />
				<label class="admin-login-label" for="password">Password</label>
				<input class="admin-login-input" id="password" type="password" formControlName="password" placeholder="Enter your password" [disabled]="isSubmitting" />
				<button class="admin-login-btn" type="submit" [disabled]="isSubmitting">{{ isSubmitting ? 'Logging in...' : 'Login' }}</button>
				<div *ngIf="loginError" class="admin-login-error">{{ loginError }}</div>
			</form>
		</ng-container>
		<ng-template #dashboard>
			<h1 class="admin-login-title">Admin Dashboard</h1>
					<button class="admin-login-btn admin-logout-btn" (click)="logout()">Logout</button>
					<div class="admin-dashboard-links">
						<a routerLink="/timeline" class="admin-login-btn admin-dashboard-link">Edit Event Timeline</a>
						<a routerLink="/admin/news" class="admin-login-btn admin-dashboard-link">Edit Latest News</a>
						<a routerLink="/admin/council" class="admin-login-btn admin-dashboard-link">Edit Discover the Council</a>
					</div>
		</ng-template>
	</div>
</div>
